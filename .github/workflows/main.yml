name: PostgreSQL Backup

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Ensure backup script is executable
        run: chmod +x scripts/backup-postgres.sh

      - name: Run PostgreSQL backup
        env:
          DATABASE_URI: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_DIR: ./backups/postgres
          BACKUP_RETENTION_DAYS: '14'
          BACKUP_PREFIX: sttpu-postgres
          BACKUP_FORMAT: custom
          BACKUP_S3_ENABLED: 'true'
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ secrets.BACKUP_S3_PREFIX }}
          BACKUP_S3_REGION: ${{ secrets.BACKUP_S3_REGION }}
          BACKUP_S3_ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          BACKUP_S3_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          BACKUP_S3_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          BACKUP_S3_STORAGE_CLASS: ${{ secrets.BACKUP_S3_STORAGE_CLASS }}
        run: ./scripts/backup-postgres.sh

      - name: Upload local backup artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-failed-run
          path: backups/postgres/*
          if-no-files-found: ignore
          retention-days: 3
